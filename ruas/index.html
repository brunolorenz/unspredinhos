<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predinho do Dia — Buscador de Ruas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --ink: #111111;
    --muted: #888888;
    --faded: #aaaaaa;
    --line: #dddddd;
    --surface: #eeebe4;
    --grid: rgba(0,0,0,0.035);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 60px 60px;
    background-attachment: fixed;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 0 80px;
    background: var(--bg);
    min-height: 100vh;
    box-shadow: 0 0 80px rgba(0,0,0,0.06);
    position: relative;
  }

  /* ── HEADER ── */
  header {
    padding: 40px 60px 36px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .header-brand { flex: 1; }

  .header-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .header-title sup {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    vertical-align: super;
    margin-left: 2px;
  }

  .header-sub {
    font-size: 15px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 6px;
  }
  .header-sub span { color: #555; }

  .header-meta {
    font-size: 12px;
    color: var(--faded);
    margin-top: 10px;
    letter-spacing: 0.03em;
  }

  .header-logo {
    width: 56px;
    height: 63px;
    object-fit: contain;
    flex-shrink: 0;
  }

  /* ── CALENDAR ── */
  .calendar-wrap {
    padding: 36px 60px 0;
    border-bottom: 1px solid var(--line);
  }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faded);
    margin-bottom: 16px;
  }

  .month-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .month-tab {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1.5px solid var(--line);
    background: transparent;
    color: var(--faded);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.12s;
  }
  .month-tab:hover { border-color: var(--ink); color: var(--ink); }
  .month-tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 48px);
    gap: 6px;
    padding-bottom: 36px;
  }

  .day-btn {
    width: 48px; height: 48px;
    border: 1.5px solid var(--line);
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.12s;
    position: relative;
  }
  .day-btn::after {
    content: '';
    position: absolute;
    bottom: 5px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--ink);
    opacity: 0;
  }
  .day-btn.has-data::after { opacity: 1; }
  .day-btn.has-data:hover { border-color: var(--ink); background: var(--surface); }
  .day-btn.selected { background: var(--ink); border-color: var(--ink); color: #fff; }
  .day-btn.selected::after { background: #fff; opacity: 1; }
  .day-btn.no-data { color: var(--line); cursor: default; border-color: transparent; }

  /* ── RESULTS ── */
  .results-wrap {
    padding: 0 60px;
  }

  /* Empty / prompt */
  .prompt-state {
    font-size: 18px;
    font-weight: 300;
    color: var(--line);
    padding: 60px 0;
    text-align: center;
    font-style: italic;
  }

  /* Results header */
  .results-header {
    padding: 36px 0 28px;
    border-bottom: 1px solid var(--line);
  }

  .results-street {
    font-size: 16px;
    font-weight: 500;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .results-date {
    font-size: 52px;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .results-stats {
    display: flex;
    gap: 32px;
    margin-top: 16px;
    align-items: baseline;
  }

  .results-stat-num {
    font-size: 40px;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .results-stat-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 3px;
  }

  .results-stat-sep {
    width: 1px;
    height: 40px;
    background: var(--line);
    align-self: center;
  }

  /* UF filter */
  .uf-filter {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 20px 0 0;
  }

  .uf-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1.5px solid var(--line);
    background: transparent;
    color: var(--faded);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.1s;
  }
  .uf-btn:hover, .uf-btn.active {
    border-color: var(--ink);
    color: var(--ink);
    background: var(--surface);
  }

  /* Street list */
  .street-group { margin-top: 28px; }

  .uf-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faded);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 4px;
  }

  .street-item {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  .street-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--ink);
  }

  .street-city {
    font-size: 12px;
    font-weight: 400;
    color: var(--faded);
    white-space: nowrap;
  }

  .maps-link {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    opacity: 0;
    transition: opacity 0.1s;
    margin-left: 8px;
    letter-spacing: 0.02em;
  }
  .street-item:hover .maps-link { opacity: 1; }

  @media (max-width: 600px) {
    header, .calendar-wrap, .results-wrap { padding-left: 24px; padding-right: 24px; }
    .results-date { font-size: 40px; }
  }
</style>
</head>

  '21º','22º','23º','24º','25º','26º','27º','28º','29º','30º','31º'];

let currentMonth = 1, currentDay = null, currentUF = null;

function getKey(d, m) { return String(d).padStart(2,'0') + '-' + String(m).padStart(2,'0'); }

function renderMonthTabs() {
  const c = document.getElementById('monthTabs');
  c.innerHTML = '';
  for (let m = 1; m <= 12; m++) {
    const btn = document.createElement('button');
    btn.className = 'month-tab' + (m === currentMonth ? ' active' : '');
    btn.textContent = MONTHS[m].substring(0,3);
    btn.title = MONTHS[m];
    btn.onclick = () => { currentMonth = m; currentDay = null; currentUF = null; renderMonthTabs(); renderDays(); renderResults(); };
    c.appendChild(btn);
  }
}

function renderDays() {
  const c = document.getElementById('daysGrid');
  c.innerHTML = '';
  const total = MONTH_DAYS[currentMonth];
  const avail = new Set(AVAILABLE[currentMonth] || []);
  for (let d = 1; d <= total; d++) {
    const btn = document.createElement('button');
    const hasData = avail.has(d);
    btn.className = 'day-btn' + (hasData ? ' has-data' : ' no-data') + (d === currentDay ? ' selected' : '');
    btn.textContent = String(d).padStart(2,'0');
    if (hasData) btn.onclick = () => { currentDay = d; currentUF = null; renderDays(); renderResults(); };
    c.appendChild(btn);
  }
}

function renderResults() {
  const area = document.getElementById('resultsArea');
  if (!currentDay) {
    area.innerHTML = '<div class="prompt-state">Escolha um dia no calendário</div>';
    return;
  }

  const key   = getKey(currentDay, currentMonth);
  const items = DATA[key] || [];
  const byUF  = {};
  items.forEach(e => { if (!byUF[e.u]) byUF[e.u] = []; byUF[e.u].push(e); });
  const ufs   = Object.keys(byUF).sort();

  // Count unique cities
  const uniqueCities = new Set(items.map(e => e.c + '|' + e.u)).size;

  const streetLabel = 'Rua ' + ORD[currentDay] + ' de ' + MONTHS[currentMonth];

  let html = `
    <div class="results-header">
      <div class="results-street">${streetLabel}</div>
      <div class="results-date">${currentDay} de ${MONTHS[currentMonth]}</div>
      <div class="results-stats">
        <div>
          <div class="results-stat-num">${uniqueCities.toLocaleString('pt-BR')}</div>
          <div class="results-stat-label">cidades</div>
        </div>
        <div class="results-stat-sep"></div>
        <div>
          <div class="results-stat-num">${ufs.length}</div>
          <div class="results-stat-label">estados</div>
        </div>
      </div>
      <div class="uf-filter">
        <button class="uf-btn${!currentUF ? ' active' : ''}" onclick="setUF(null)">Todos</button>
        ${ufs.map(uf => `<button class="uf-btn${currentUF === uf ? ' active' : ''}" onclick="setUF('${uf}')">${uf} <span style="opacity:.5;font-weight:400">${byUF[uf].length}</span></button>`).join('')}
      </div>
    </div>`;

  const groups   = currentUF ? {[currentUF]: byUF[currentUF]} : byUF;
  const showUFs  = currentUF ? [currentUF] : ufs;

  const HIGHLIGHT_UF = new Set(['AP','PI','RR','DF']);

  showUFs.forEach(uf => {
    const ufStyle = HIGHLIGHT_UF.has(uf) ? ' style="color:#E07B3A"' : '';
    html += `<div class="street-group">
      <div class="uf-header"${ufStyle}>${uf}</div>`;
    groups[uf].forEach(e => {
      const q = encodeURIComponent(e.l + ', ' + e.c + ', ' + e.u + ', Brasil');
      html += `<div class="street-item">
        <span class="street-name">${e.l}<a class="maps-link" href="#" data-q="${q}" onclick="openMaps(this);return false;">↗ maps</a></span>
        <span class="street-city">${e.c}</span>
      </div>`;
    });
    html += `</div>`;
  });

  area.innerHTML = html;
}

function setUF(uf) { currentUF = uf; renderResults(); }
function openMaps(el) { window.open('https://www.google.com/maps/search/?api=1&query=' + el.getAttribute('data-q'), '_blank'); }

renderMonthTabs();
renderDays();
renderResults();
