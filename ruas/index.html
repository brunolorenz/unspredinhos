<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predinho do Dia — Buscador de Ruas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef; --ink: #111111; --muted: #888888;
    --faded: #aaaaaa; --line: #dddddd; --surface: #eeebe4;
    --grid: rgba(0,0,0,0.035); --vote: #c8401a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh;
    background-image: linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size: 60px 60px; background-attachment: fixed;
  }
  .container { max-width:860px; margin:0 auto; padding:0 0 80px; background:var(--bg); min-height:100vh; box-shadow:0 0 80px rgba(0,0,0,0.06); }

  /* Loading */
  #loading {
    position:fixed; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:100; transition:opacity 0.4s;
  }
  #loading.hidden { opacity:0; pointer-events:none; }
  .loading-bar-wrap { width:200px; height:3px; background:var(--line); border-radius:2px; }
  .loading-bar { height:100%; background:var(--ink); border-radius:2px; width:0%; transition:width 0.3s; }
  .loading-title { font-size:22px; font-weight:700; }
  .loading-sub { font-size:14px; color:var(--muted); }

  /* Header */
  header { padding:40px 60px 36px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:24px; }
  .header-brand { flex:1; }
  .header-title { font-size:28px; font-weight:700; letter-spacing:-0.01em; }
  .header-title sup { font-size:13px; font-weight:400; color:var(--muted); vertical-align:super; margin-left:2px; }
  .header-sub { font-size:15px; color:var(--muted); margin-top:6px; }
  .header-sub span { color:#555; }
  .header-meta { font-size:12px; color:var(--faded); margin-top:10px; }
  .header-logo { width:56px; height:63px; object-fit:contain; flex-shrink:0; }

  /* Nav tabs */
  .nav-tabs { display:flex; border-bottom:1px solid var(--line); padding:0 60px; }
  .nav-tab {
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.04em;
    padding:14px 0; margin-right:32px; border:none; background:transparent;
    color:var(--faded); cursor:pointer; border-bottom:2px solid transparent;
    margin-bottom:-1px; transition:all 0.15s;
  }
  .nav-tab:hover { color:var(--ink); }
  .nav-tab.active { color:var(--ink); border-bottom-color:var(--ink); }

  /* Views */
  .view { display:none; }
  .view.active { display:block; }

  /* Calendar */
  .calendar-wrap { padding:36px 60px 0; border-bottom:1px solid var(--line); }
  .section-label { font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--faded); margin-bottom:16px; }
  .month-tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:20px; }
  .month-tab {
    font-family:'Inter',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; padding:6px 14px; border:1.5px solid var(--line);
    background:transparent; color:var(--faded); cursor:pointer; border-radius:4px; transition:all 0.12s;
  }
  .month-tab:hover { border-color:var(--ink); color:var(--ink); }
  .month-tab.active { background:var(--ink); border-color:var(--ink); color:#fff; }
  .days-grid { display:grid; grid-template-columns:repeat(auto-fill,48px); gap:6px; padding-bottom:36px; }
  .day-btn {
    width:48px; height:48px; border:1.5px solid var(--line); background:transparent;
    font-family:'Inter',sans-serif; font-size:14px; font-weight:500; color:var(--ink);
    cursor:pointer; border-radius:6px; transition:all 0.12s; position:relative;
  }
  .day-btn::after { content:''; position:absolute; bottom:5px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--ink); opacity:0; }
  .day-btn.has-data::after { opacity:1; }
  .day-btn.has-data:hover { border-color:var(--ink); background:var(--surface); }
  .day-btn.selected { background:var(--ink); border-color:var(--ink); color:#fff; }
  .day-btn.selected::after { background:#fff; opacity:1; }
  .day-btn.no-data { color:var(--line); cursor:default; border-color:transparent; }

  /* Results */
  .results-wrap { padding:0 60px; }
  .prompt-state { font-size:18px; font-weight:300; color:var(--line); padding:60px 0; text-align:center; font-style:italic; }
  .results-header { padding:36px 0 28px; border-bottom:1px solid var(--line); }
  .results-street { font-size:16px; font-weight:500; font-style:italic; color:var(--muted); margin-bottom:4px; }
  .results-date { font-size:52px; font-weight:900; color:var(--ink); letter-spacing:-0.03em; line-height:1; }
  .results-stats { display:flex; gap:32px; margin-top:16px; align-items:baseline; }
  .results-stat-num { font-size:40px; font-weight:900; letter-spacing:-0.03em; line-height:1; }
  .results-stat-label { font-size:13px; font-weight:400; color:var(--muted); margin-top:3px; }
  .results-stat-sep { width:1px; height:40px; background:var(--line); align-self:center; }
  .uf-filter { display:flex; gap:6px; flex-wrap:wrap; padding:20px 0 0; }
  .uf-btn {
    font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; padding:4px 10px; border:1.5px solid var(--line);
    background:transparent; color:var(--faded); cursor:pointer; border-radius:4px; transition:all 0.1s;
  }
  .uf-btn:hover, .uf-btn.active { border-color:var(--ink); color:var(--ink); background:var(--surface); }

  /* Street list */
  .street-group { margin-top:28px; }
  .uf-header { font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--faded); padding-bottom:8px; border-bottom:1px solid var(--line); margin-bottom:4px; }
  .street-item { display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.05); }
  .street-name { font-size:14px; color:var(--ink); }
  .street-city { font-size:12px; color:var(--faded); white-space:nowrap; }
  .maps-link { font-size:11px; font-weight:500; color:var(--ink); text-decoration:none; opacity:0; transition:opacity 0.1s; margin-left:6px; }
  .street-item:hover .maps-link { opacity:1; }

  /* Vote button */
  .vote-btn {
    position:relative; display:flex; align-items:center; gap:5px;
    font-family:'Inter',sans-serif; font-size:12px; font-weight:600;
    padding:5px 12px; border-radius:20px; border:1.5px solid var(--line);
    background:transparent; color:var(--faded); cursor:pointer;
    transition:all 0.2s; white-space:nowrap; flex-shrink:0; overflow:visible;
  }
  .vote-btn:hover:not(.voted) { border-color:var(--vote); color:var(--vote); transform:scale(1.05); }
  .vote-btn.voted { background:var(--vote); border-color:var(--vote); color:#fff; }
  .vote-btn.voting { pointer-events:none; }
  .vote-btn .heart { display:inline-block; transition:transform 0.1s; font-style:normal; }
  .vote-btn.voted .heart { animation:heartPop 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }
  @keyframes heartPop {
    0%   { transform:scale(1); }
    30%  { transform:scale(1.5); }
    60%  { transform:scale(0.9); }
    80%  { transform:scale(1.15); }
    100% { transform:scale(1); }
  }

  /* Particle canvas */
  .particle-canvas {
    position:fixed; pointer-events:none; z-index:999;
    top:0; left:0; width:100%; height:100%;
  }

  /* ── RANKING VIEW ── */
  .ranking-wrap { padding:36px 60px; }
  .ranking-header { margin-bottom:28px; }
  .ranking-title { font-size:36px; font-weight:900; letter-spacing:-0.03em; line-height:1; }
  .ranking-sub { font-size:14px; color:var(--muted); margin-top:8px; }
  .ranking-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px; }
  .rank-filter-btn {
    font-family:'Inter',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; padding:6px 14px; border:1.5px solid var(--line);
    background:transparent; color:var(--faded); cursor:pointer; border-radius:4px; transition:all 0.12s;
  }
  .rank-filter-btn:hover { border-color:var(--ink); color:var(--ink); }
  .rank-filter-btn.active { background:var(--ink); border-color:var(--ink); color:#fff; }

  .ranking-empty { font-size:16px; color:var(--faded); font-style:italic; padding:40px 0; text-align:center; }

  .rank-item {
    display:grid; grid-template-columns:40px 1fr auto;
    align-items:center; gap:16px; padding:14px 0;
    border-bottom:1px solid rgba(0,0,0,0.05);
  }
  .rank-pos { font-size:20px; font-weight:900; color:var(--line); }
  .rank-pos.top { color:var(--vote); }
  .rank-info {}
  .rank-city { font-size:16px; font-weight:600; color:var(--ink); }
  .rank-date { font-size:12px; color:var(--muted); margin-top:2px; }
  .rank-votes { text-align:right; }
  .rank-votes-num { font-size:24px; font-weight:900; color:var(--ink); letter-spacing:-0.02em; }
  .rank-votes-label { font-size:11px; color:var(--faded); }
  .rank-bar-wrap { height:3px; background:var(--line); border-radius:2px; margin-top:6px; }
  .rank-bar { height:100%; background:var(--vote); border-radius:2px; }

  /* Toast */
  #toast {
    position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#f7f4ef; padding:12px 24px; border-radius:8px;
    font-size:14px; font-weight:500; opacity:0; transition:all 0.3s; pointer-events:none; z-index:200; white-space:nowrap;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media(max-width:600px) {
    header,.nav-tabs,.calendar-wrap,.results-wrap,.ranking-wrap { padding-left:24px; padding-right:24px; }
    .results-date { font-size:40px; }
    .ranking-title { font-size:28px; }
  }
</style>
</head>

function spawnParticles(x, y) {
  const colors = ['#c8401a','#e85d2a','#f4a261','#e76f51','#ff8fa3','#ffb3c1'];
  for (let i = 0; i < 24; i++) {
    const angle = (Math.PI * 2 / 24) * i + (Math.random() - 0.5) * 0.4;
    const speed = 2.5 + Math.random() * 4;

    const shape = Math.random() < 0.5 ? 'heart' : 'circle';

      pctx.fill();
    }
    pctx.restore();
  });

  if (particles.length > 0) requestAnimationFrame(animateParticles);
  else { animating = false; pctx.clearRect(0, 0, canvas.width, canvas.height); }
}

// ── Load CSV ──
async function loadCSV() {
  const bar = document.getElementById('loadingBar');
  const msg = document.getElementById('loadingMsg');
  try {
    bar.style.width = '20%';
    const resp = await fetch('ruas_com_datas.csv');
    bar.style.width = '50%'; msg.textContent = 'Processando dados…';
    const text  = await resp.text();
    const lines = text.trim().split('\n');
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length < 5) continue;
      const dia  = cols[0].trim(), mes = cols[1].trim();
      const uf   = cols[cols.length-1].trim();
      const cidade     = cols[cols.length-2].trim();
      const logradouro = cols.slice(2, cols.length-2).join(',').trim();
      const key = dia.padStart(2,'0')+'-'+mes.padStart(2,'0');
      if (!DATA[key]) DATA[key] = [];
      DATA[key].push({l: logradouro, c: cidade, u: uf});
    }
    bar.style.width = '100%';
    const total = Object.values(DATA).reduce((s,a)=>s+a.length,0);
    document.getElementById('headerMeta').textContent =
      total.toLocaleString('pt-BR')+' logradouros · '+Object.keys(DATA).length+' datas · 27 estados';
    await new Promise(r=>setTimeout(r,300));
    document.getElementById('loading').classList.add('hidden');
    renderMonthTabs(); renderDays(); renderResults();
    loadAllVotes();
  } catch(e) { document.getElementById('loadingMsg').textContent = 'Erro ao carregar CSV.'; }
}

// ── Votes ──
async function loadVotes(dia, mes) {
  const key = String(dia).padStart(2,'0')+'-'+String(mes).padStart(2,'0');
  if (votesCache[key] !== undefined) return;
  votesCache[key] = {};
  if (!SCRIPT_URL || SCRIPT_URL.includes('SEU_')) return;
  try {
    const resp = await fetch(`${SCRIPT_URL}?dia=${dia}&mes=${mes}`);
    const data = await resp.json();
    if (data.votes) data.votes.forEach(v => { votesCache[key][v.cidade+'|'+v.uf] = v.votos; });
  } catch(e) {}
}

async function loadAllVotes() {
  if (!SCRIPT_URL || SCRIPT_URL.includes('SEU_')) {
    // Demo: use local votesCache
    rebuildAllVotesFromCache();
    return;
  }
  try {
    const resp = await fetch(`${SCRIPT_URL}?all=1`);
    const data = await resp.json();
    if (data.votes) { allVotes = data.votes; renderRanking(); }
  } catch(e) {}
}

function rebuildAllVotesFromCache() {
  allVotes = [];
  Object.entries(votesCache).forEach(([key, cities]) => {
    const dia = parseInt(key.slice(0,2)), mes = parseInt(key.slice(3,5));
    Object.entries(cities).forEach(([ck, count]) => {
      const [cidade, uf] = ck.split('|');
      allVotes.push({dia, mes, cidade, uf, votos: count});
    });
  });
  allVotes.sort((a,b) => b.votos - a.votos);
  renderRanking();
}

async function vote(dia, mes, cidade, uf, btn) {
  const voteKey = `${dia}-${mes}-${cidade}-${uf}`;
  if (votedCache.has(voteKey)) return;

  btn.classList.add('voting');

  // Get button position for particles
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 2;

  try {
    const cacheKey = String(dia).padStart(2,'0')+'-'+String(mes).padStart(2,'0');
    if (SCRIPT_URL && !SCRIPT_URL.includes('SEU_')) {
      const resp = await fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({dia,mes,cidade,uf})});
      const data = await resp.json();
      if (data.ok) {
        const ck = cidade+'|'+uf;
        votesCache[cacheKey] = votesCache[cacheKey] || {};
        votesCache[cacheKey][ck] = data.votos;
      }
    } else {
      const ck = cidade+'|'+uf;
      votesCache[cacheKey] = votesCache[cacheKey] || {};
      votesCache[cacheKey][ck] = (votesCache[cacheKey][ck] || 0) + 1;
    }

    votedCache.add(voteKey);
    localStorage.setItem('pdd_votes', JSON.stringify([...votedCache]));

    // Animate
    btn.classList.remove('voting');
    btn.classList.add('voted');
    const count = (votesCache[String(dia).padStart(2,'0')+'-'+String(mes).padStart(2,'0')][cidade+'|'+uf]) || 1;
    btn.innerHTML = `<i class="heart">♥</i> ${count}`;

    // Spawn particles
    spawnParticles(cx, cy);
    showToast('♥ ' + cidade + ' — voto registrado!');

    // Update ranking cache
    rebuildAllVotesFromCache();

  } catch(e) {
    btn.classList.remove('voting');
    showToast('Erro ao registrar voto.');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── View switching ──
function switchView(view, tabEl) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  tabEl.classList.add('active');
  if (view === 'ranking') renderRanking();
}

// ── Ranking ──
function setRankFilter(filter, btn) {
  rankFilter = filter;
  document.querySelectorAll('.rank-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRanking();
}

function renderRanking() {
  const list = document.getElementById('rankingList');
  const sub  = document.getElementById('rankingSub');

  let filtered = [...allVotes];

  if (rankFilter === 'mes') {
    const now = new Date();
    const mes = currentDay ? currentMonth : now.getMonth()+1;
    filtered = filtered.filter(v => v.mes === mes);
    sub.textContent = 'Filtrado por ' + MONTHS[mes];
  } else if (rankFilter === 'data' && currentDay) {
    filtered = filtered.filter(v => v.dia === currentDay && v.mes === currentMonth);
    sub.textContent = 'Filtrado por ' + currentDay + ' de ' + MONTHS[currentMonth];
  } else {
    sub.textContent = filtered.length + ' cidades votadas no total';
  }

  filtered.sort((a,b) => b.votos - a.votos);
  const top = filtered.slice(0, 50);
  const max = top.length > 0 ? top[0].votos : 1;

  if (top.length === 0) {
    list.innerHTML = '<div class="ranking-empty">Nenhum voto registrado ainda.<br>Seja o primeiro a votar!</div>';
    return;
  }

  sub.textContent = filtered.length + ' cidade' + (filtered.length !== 1 ? 's' : '') + ' votada' + (filtered.length !== 1 ? 's' : '');

  list.innerHTML = top.map((v, i) => {
    const pct = Math.round((v.votos / max) * 100);
    return `<div class="rank-item">
      <div class="rank-pos${i < 3 ? ' top' : ''}">${i+1}</div>
      <div class="rank-info">
        <div class="rank-city">${v.cidade} <span style="font-weight:400;color:var(--muted);font-size:13px">${v.uf}</span></div>
        <div class="rank-date">${v.dia} de ${MONTHS[v.mes]}</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="rank-votes">
        <div class="rank-votes-num">${v.votos}</div>
        <div class="rank-votes-label">voto${v.votos !== 1 ? 's' : ''}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Calendar & Results ──
function getKey(d,m) { return String(d).padStart(2,'0')+'-'+String(m).padStart(2,'0'); }

function renderMonthTabs() {
  const c = document.getElementById('monthTabs'); c.innerHTML='';
  for (let m=1;m<=12;m++) {
    const btn = document.createElement('button');
    btn.className = 'month-tab'+(m===currentMonth?' active':'');
    btn.textContent = MONTHS[m].substring(0,3); btn.title = MONTHS[m];
    btn.onclick = ()=>{ currentMonth=m; currentDay=null; currentUF=null; renderMonthTabs(); renderDays(); renderResults(); };
    c.appendChild(btn);
  }
}

function renderDays() {
  const c = document.getElementById('daysGrid'); c.innerHTML='';
  const total = MONTH_DAYS[currentMonth];
  const avail = new Set(AVAILABLE[currentMonth]||[]);
  for (let d=1;d<=total;d++) {
    const btn = document.createElement('button');
    const hasData = avail.has(d);
    btn.className = 'day-btn'+(hasData?' has-data':' no-data')+(d===currentDay?' selected':'');
    btn.textContent = String(d).padStart(2,'0');
    if (hasData) btn.onclick = ()=>{ currentDay=d; currentUF=null; renderDays(); renderResults(); };
    c.appendChild(btn);
  }
}

async function renderResults() {
  const area = document.getElementById('resultsArea');
  if (!currentDay) { area.innerHTML='<div class="prompt-state">Escolha um dia no calendário</div>'; return; }
  const key   = getKey(currentDay,currentMonth);
  const items = DATA[key]||[];
  const byUF  = {};
  items.forEach(e=>{ if(!byUF[e.u]) byUF[e.u]=[]; byUF[e.u].push(e); });
  const ufs = Object.keys(byUF).sort();
  const uniqueCities = new Set(items.map(e=>e.c+'|'+e.u)).size;
  const streetLabel  = 'Rua '+ORD[currentDay]+' de '+MONTHS[currentMonth];

  let html = `<div class="results-header">
    <div class="results-street">${streetLabel}</div>
    <div class="results-date">${currentDay} de ${MONTHS[currentMonth]}</div>
    <div class="results-stats">
      <div><div class="results-stat-num">${uniqueCities.toLocaleString('pt-BR')}</div><div class="results-stat-label">cidades</div></div>
      <div class="results-stat-sep"></div>
      <div><div class="results-stat-num">${ufs.length}</div><div class="results-stat-label">estados</div></div>
    </div>
    <div class="uf-filter">
      <button class="uf-btn${!currentUF?' active':''}" onclick="setUF(null)">Todos</button>
      ${ufs.map(uf=>`<button class="uf-btn${currentUF===uf?' active':''}" onclick="setUF('${uf}')">${uf} <span style="opacity:.5;font-weight:400">${byUF[uf].length}</span></button>`).join('')}
    </div>
  </div>`;

  await loadVotes(currentDay, currentMonth);
  const votes  = votesCache[key]||{};
  const groups = currentUF?{[currentUF]:byUF[currentUF]}:byUF;
  const showUFs= currentUF?[currentUF]:ufs;

  showUFs.forEach(uf => {
    html += `<div class="street-group"><div class="uf-header">${uf}</div>`;
    const cityMap = {};
    groups[uf].forEach(e=>{ if(!cityMap[e.c]) cityMap[e.c]=[]; cityMap[e.c].push(e); });
    Object.entries(cityMap).forEach(([cidade, ruas]) => {
      const vKey    = cidade+'|'+uf;
      const count   = votes[vKey]||0;
      const voteKey = `${currentDay}-${currentMonth}-${cidade}-${uf}`;
      const voted   = votedCache.has(voteKey);
      ruas.forEach((e,idx) => {
        const q = encodeURIComponent(e.l+', '+e.c+', '+e.u+', Brasil');
        if (idx===0) {
          html += `<div class="street-item">
            <span class="street-name">${e.l}<a class="maps-link" href="#" data-q="${q}" onclick="openMaps(this);return false;">↗ maps</a></span>
            <span class="street-city">${e.c}</span>
            <button class="vote-btn${voted?' voted':''}"
              onclick="vote(${currentDay},${currentMonth},'${cidade.replace(/'/g,"\'")}','${uf}',this)">
              <i class="heart">${voted?'♥':'♡'}</i>${count>0?' '+count:''}
            </button>
          </div>`;
        } else {
          html += `<div class="street-item">
            <span class="street-name">${e.l}<a class="maps-link" href="#" data-q="${q}" onclick="openMaps(this);return false;">↗ maps</a></span>
            <span class="street-city" style="opacity:.4">${e.c}</span>
            <span></span>
          </div>`;
        }
      });
    });
    html += `</div>`;
  });

  area.innerHTML = html;
}

function setUF(uf) { currentUF=uf; renderResults(); }
function openMaps(el) { window.open('https://www.google.com/maps/search/?api=1&query='+el.getAttribute('data-q'),'_blank'); }

loadCSV();
</script>
